name: Release / Snapshot Deployment

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Extract version from tag
      id: get_version
      run: |
        TAG_NAME="${{ github.ref_name }}"
        # Strip 'v' prefix if present
        VERSION="${TAG_NAME#v}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        
        if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
          echo "is_snapshot=true" >> $GITHUB_OUTPUT
        else
          echo "is_snapshot=false" >> $GITHUB_OUTPUT
        fi

    - name: Build, Test and Package
      run: ./gradlew build
      env:
        RELEASE_VERSION: ${{ steps.get_version.outputs.version }}

    - name: Publish to Maven Repository
      run: ./gradlew publish
      env:
        RELEASE_VERSION: ${{ steps.get_version.outputs.version }}
        ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
        ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Create GitHub Release
      if: steps.get_version.outputs.is_snapshot == 'false'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/libs/ff-set-${{ steps.get_version.outputs.version }}.jar
          build/libs/ff-set-${{ steps.get_version.outputs.version }}-sources.jar
          build/libs/ff-set-${{ steps.get_version.outputs.version }}-javadoc.jar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
