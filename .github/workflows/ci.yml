name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target-jdk: [8, 11, 17, 21]

    steps:
    - name: Checkout PR Branch
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.target-jdk == 21 && '21' || '17' }}
        distribution: 'temurin'
        cache: gradle

    - name: Build and Run Tests (PR Branch)
      run: |
        if [ "${{ matrix.target-jdk }}" = "8" ] || [ "${{ matrix.target-jdk }}" = "11" ]; then
          ./gradlew compileJava -PtargetJdk=${{ matrix.target-jdk }}
        else
          ./gradlew test jacocoTestReport -PtargetJdk=${{ matrix.target-jdk }}
        fi

    - name: Save PR Coverage
      if: matrix.target-jdk == 17
      run: |
        cp build/reports/jacoco/test/jacocoTestReport.xml /tmp/jacoco-pr.xml

    - name: Checkout Base Branch
      if: github.event_name == 'pull_request' && matrix.target-jdk == 17
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        clean: false

    - name: Build and Run Tests (Base Branch)
      if: github.event_name == 'pull_request' && matrix.target-jdk == 17
      run: ./gradlew test jacocoTestReport -PtargetJdk=17

    - name: Save Base Coverage
      if: github.event_name == 'pull_request' && matrix.target-jdk == 17
      run: |
        cp build/reports/jacoco/test/jacocoTestReport.xml /tmp/jacoco-base.xml

    - name: Restore PR Branch
      if: github.event_name == 'pull_request' && matrix.target-jdk == 17
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        clean: false

    - name: Compare Coverage
      if: github.event_name == 'pull_request' && matrix.target-jdk == 17
      run: |
        python3 .github/scripts/compare-coverage.py \
          --base /tmp/jacoco-base.xml \
          --pr /tmp/jacoco-pr.xml \
          --base-branch ${{ github.event.pull_request.base.ref }} \
          --output /tmp/report.md

    - name: Post PR Comment
      if: github.event_name == 'pull_request' && matrix.target-jdk == 17
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const path = require('path');
          const reportPath = '/tmp/report.md';
          if (!fs.existsSync(reportPath)) {
            console.log('No report file found.');
            return;
          }
          const body = fs.readFileSync(reportPath, 'utf8');
          
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
          });
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && comment.body.includes('### 📊 Code Coverage Report')
          );
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          }

    - name: Publish to Aliyun Maven
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: ./gradlew publish -PtargetJdk=${{ matrix.target-jdk }}
      env:
        ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
        ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
